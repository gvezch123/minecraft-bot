<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Bot Control</title>

<style>
body{
    background:#1e1e1e;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

#viewer{
    width:960px;
    height:540px;
    margin:auto;
    border:2px solid #444;
    border-radius:10px;
    overflow:hidden;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

#chat{
    margin-top:20px;
}

#msg{
    width:400px;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

.controls{
    margin-top:30px;
}

.row{
    margin:5px;
}

.key{
    width:70px;
    height:70px;
    margin:3px;
    font-size:20px;
    font-weight:bold;
}

.special{
    width:120px;
}

.mouse{
    margin-top:20px;
}

.arrow-controls{
    margin-top:20px;
    display:inline-block;
}

.arrow-row{
    margin:5px;
}

.arrow-btn{
    width:60px;
    height:60px;
    margin:2px;
    font-size:24px;
    font-weight:bold;
    background:#444;
    color:white;
    border:2px solid #666;
    border-radius:5px;
    cursor:pointer;
    transition:0.1s;
}

.arrow-btn:active{
    background:#666;
    transform:scale(0.95);
}

.arrow-btn:hover{
    background:#555;
}

</style>

</head>
<body>

<h1>Minecraft Bot Control Panel</h1>

<div id="viewer">
    <iframe src="http://localhost:3007"></iframe>
</div>

<div id="chat">
    <input id="msg" placeholder="Сообщение бота">
    <button onclick="sendChat()">Отправить</button>
</div>

<div class="controls">

<div class="row">
    <button class="key"
        onmousedown="press('forward')"
        onmouseup="release('forward')">W</button>
</div>

<div class="row">
    <button class="key"
        onmousedown="press('left')"
        onmouseup="release('left')">A</button>

    <button class="key"
        onmousedown="press('back')"
        onmouseup="release('back')">S</button>

    <button class="key"
        onmousedown="press('right')"
        onmouseup="release('right')">D</button>
</div>

<div class="row">
    <button class="key special"
        onmousedown="press('jump')"
        onmouseup="release('jump')">SPACE</button>

    <button class="key special"
        onmousedown="press('sneak')"
        onmouseup="release('sneak')">SHIFT</button>
</div>

</div>

<div class="arrow-controls">
    <h3>Поворот головы</h3>
    
    <div class="arrow-row">
        <button class="arrow-btn"
            onmousedown="lookUp()"
            onmouseup="lookStop()">⬆️</button>
    </div>
    
    <div class="arrow-row">
        <button class="arrow-btn"
            onmousedown="lookLeft()"
            onmouseup="lookStop()">⬅️</button>
        
        <button class="arrow-btn"
            onmousedown="lookDown()"
            onmouseup="lookStop()">⬇️</button>
        
        <button class="arrow-btn"
            onmousedown="lookRight()"
            onmouseup="lookStop()">➡️</button>
    </div>
</div>

<div class="mouse">
    <button
        onmousedown="mouseClick('left')"
        onmouseup="mouseRelease('left')">
        ЛКМ
    </button>

    <button
        onmousedown="mouseClick('right')"
        onmouseup="mouseRelease('right')">
        ПКМ
    </button>
</div>

<script>

const input = document.getElementById('msg')

input.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){
        sendChat()
    }
})

async function sendChat(){
    const message = input.value
    if(!message.trim()) return

    await fetch('/bot/chat',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            message
        })
    })

    input.value=''
}

async function press(key){
    await fetch('/bot/control',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            key,
            state:true
        })
    })
}

async function release(key){
    await fetch('/bot/control',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            key,
            state:false
        })
    })
}

async function mouseClick(button){
    await fetch('/bot/mouse',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            button,
            action: 'press'
        })
    })
}

async function mouseRelease(button){
    await fetch('/bot/mouse',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            button,
            action: 'release'
        })
    })
}

async function lookUp(){
    await fetch('/bot/look',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            direction: 'up'
        })
    })
}

async function lookDown(){
    await fetch('/bot/look',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            direction: 'down'
        })
    })
}

async function lookLeft(){
    await fetch('/bot/look',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            direction: 'left'
        })
    })
}

async function lookRight(){
    await fetch('/bot/look',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            direction: 'right'
        })
    })
}

async function lookStop(){
    await fetch('/bot/look',{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify({
            direction: 'stop'
        })
    })
}

document.addEventListener('keydown',(e)=>{
    if(e.repeat) return

    switch(e.key.toLowerCase()){
        case 'w':
            press('forward')
            break
        case 'a':
            press('left')
            break
        case 's':
            press('back')
            break
        case 'd':
            press('right')
            break
        case ' ':
            e.preventDefault()
            press('jump')
            break
        case 'shift':
            press('sneak')
            break
        case 'arrowup':
            e.preventDefault()
            lookUp()
            break
        case 'arrowdown':
            e.preventDefault()
            lookDown()
            break
        case 'arrowleft':
            e.preventDefault()
            lookLeft()
            break
        case 'arrowright':
            e.preventDefault()
            lookRight()
            break
    }
})

document.addEventListener('keyup',(e)=>{
    switch(e.key.toLowerCase()){
        case 'w':
            release('forward')
            break
        case 'a':
            release('left')
            break
        case 's':
            release('back')
            break
        case 'd':
            release('right')
            break
        case ' ':
            e.preventDefault()
            release('jump')
            break
        case 'shift':
            release('sneak')
            break
        case 'arrowup':
        case 'arrowdown':
        case 'arrowleft':
        case 'arrowright':
            e.preventDefault()
            lookStop()
            break
    }
})

</script>

</body>
</html>
